name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'Direct Download URL for recovery.img'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt install git wget lz4 tar openssl python3 -y

    - name: Fetch image from URL
      run: |
        wget -L "${{ github.event.inputs.RECOVERY_URL }}" -O recovery.img
        if [ ! -f recovery.img ]; then echo "Download failed"; exit 1; fi

    - name: Patch Process-1
      run: |
        chmod a+x script1.sh
        chmod a+x magiskboot
        ./script1.sh recovery.img || true

    - name: Patch Process-2
      run: |
        chmod a+x script2.sh
        ./script2.sh || true
        
        # Check if patching actually produced an image
        if [ ! -f r-patched.img ]; then echo "Error: r-patched.img not found. Patching failed."; exit 1; fi

        # COMPRESSION STEP: Shrink the 63MB image to fit the 39MB partition
        # This is critical for Samsung Android 14 devices
        mv r-patched.img bloated.img
        lz4 -9 -f bloated.img r-patched.img
        rm bloated.img

        # Calculate aligned partition size (multiple of 4096)
        ORIGINAL_SIZE=$(wc -c < recovery.img)
        ALIGNED_SIZE=$(( ($ORIGINAL_SIZE + 4095) / 4096 * 4096 ))
        
        # Sign the image with avbtool
        python3 avbtool extract_public_key --key phh.pem --output phh.pub.bin
        python3 avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size $ALIGNED_SIZE \
          --image r-patched.img \
          --key phh.pem \
          --algorithm SHA256_RSA4096
        
        # Prepare for upload
        mkdir output
        mv r-patched.img output/recovery.img
        cd output
        tar cvf fastbootd-recovery.tar recovery.img
        md5sum -t fastbootd-recovery.tar >> fastbootd-recovery.tar
        mv fastbootd-recovery.tar fastbootd-recovery.tar.md5

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-Recovery-F23
        path: output/fastbootd-recovery.tar.md5
