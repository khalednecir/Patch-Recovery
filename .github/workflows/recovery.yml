<layout>
# domains_identified: [no_match]
</layout>
name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'Direct Download URL for recovery.img'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt install git wget lz4 tar openssl python3 -y

    - name: Fetch image from URL
      run: |
        # Use -L to follow redirects from hosts like Catbox
        wget -L "${{ github.event.inputs.RECOVERY_URL }}" -O recovery.img
        if [ ! -f recovery.img ]; then echo "Download failed"; exit 1; fi

    - name: Patch Process-1
      run: |
        chmod a+x script1.sh
        chmod a+x magiskboot
        # Force LZ4 compression to keep size within partition limits
        export MAGISK_COMPRESSION="lz4"
        ./script1.sh recovery.img || true

    - name: Patch Process-2
      run: |
        chmod a+x script2.sh
        ./script2.sh || true
        
        # Check if patching actually produced an image
        if [ ! -f r-patched.img ]; then echo "Error: r-patched.img not found. Patching failed."; exit 1; fi

        # Calculate aligned partition size (multiple of 4096)
        ORIGINAL_SIZE=$(wc -c < recovery.img)
        ALIGNED_SIZE=$(( ($ORIGINAL_SIZE + 4095) / 4096 * 4096 ))
        
        # Sign the image with avbtool using the corrected filename and aligned size
        python3 avbtool extract_public_key --key phh.pem --output phh.pub.bin
        python3 avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size $ALIGNED_SIZE \
          --image r-patched.img \
          --key phh.pem \
          --algorithm SHA256_RSA4096
        
        # Prepare for upload
        mkdir output
        mv r-patched.img output/recovery.img
        cd output
        tar cvf fastbootd-recovery.tar recovery.img
        md5sum -t fastbootd-recovery.tar >> fastbootd-recovery.tar
        mv fastbootd-recovery.tar fastbootd-recovery.tar.md5

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Patched-Recovery-F23
        path: output/fastbootd-recovery.tar.md5

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: output/*.md5
        name: Patched-Recovery
        tag_name: ${{ github.run_id }}
name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'RECOVERY URL'
        required: true
        default: 'https://files.catbox.moe/(RECOMMENDED)'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare the environment
      run: |
        sudo apt install git wget lz4 tar openssl python3 -y

    - name: Fetch image from URL
      run: |
        ls
        pwd
        wget ${{ github.event.inputs.RECOVERY_URL }} -O recovery.img

   - name: Patch Process-1
      run: |
        chmod a+x script1.sh
        chmod a+x magiskboot
        # Force Magisk to use high compression (lz4 or gzip)
        export MAGISK_COMPRESSION="lz4" 
        ./script1.sh recovery.img || true


    - name: Patch Process-2
      run: |
        chmod a+x script2.sh
        ./script2.sh || true
        
        # Calculate aligned partition size
        ORIGINAL_SIZE=$(wc -c < recovery.img)
        ALIGNED_SIZE=$(( ($ORIGINAL_SIZE + 4095) / 4096 * 4096 ))
        
        python3 avbtool extract_public_key --key phh.pem --output phh.pub.bin
        
        # Use the aligned size and correct image name
        python3 avbtool add_hash_footer --partition_name recovery --partition_size $ALIGNED_SIZE --image r-patched.img --key phh.pem --algorithm SHA256_RSA4096
        
        mkdir output
        mv r-patched.img output/recovery.img
        cd output
        tar cvf fastbootd-recovery.tar recovery.img
        md5sum -t fastbootd-recovery.tar >> fastbootd-recovery.tar
        mv fastbootd-recovery.tar fastbootd-recovery.tar.md5
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: output/*.md5
        name: Patched-Recovery
        tag_name: ${{ github.run_id }}
